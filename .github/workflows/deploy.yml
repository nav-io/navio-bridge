name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # --ignore-scripts: navio-blsct's install script runs a native node-gyp
      # build (needs build-essential) that the web bundle does not use — it
      # consumes the prebuilt WASM shipped in the package. dist/ + wasm/ ship
      # prebuilt, and vite 8's bundler (rolldown) needs no postinstall.
      - run: npm ci --ignore-scripts
      - run: npm run build
      # SPA fallback: GitHub Pages serves 404.html for unknown paths;
      # a copy of index.html lets react-router (BrowserRouter) handle deep links.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
